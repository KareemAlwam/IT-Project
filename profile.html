<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - TravelHub</title>
    <link rel="stylesheet" href="MainLayout/style.css">
    <link rel="stylesheet" href="MainLayout/profile.css">
    <link id="layoutTheme" rel="stylesheet" href="" data-newhref="NewLayout/theme.css">
    <script>
        (function(){
            if (localStorage.getItem('layout') === 'new') {
                document.documentElement.classList.add('layout-new');
                var l = document.getElementById('layoutTheme');
                if (l) l.setAttribute('href', l.getAttribute('data-newhref'));
            }
        })();
    </script>
</head>
<body>
<nav class="navbar">
        <a href="index.html" class="logo"> TravelHub</a>
        <div class="nav-links">
            <button id="layoutToggleBtn" class="layout-toggle-btn" type="button" onclick="toggleLayout()">Dark</button>
            <a href="login.html" id="profileLoginLink" class="login-link">Login</a>
            <button id="logoutBtn" class="logout-btn" onclick="logout()" style="display: none;">Logout</button>
        </div>
    </nav>

<div class="container">
        <div class="card">
            <h2> Share your travel experience</h2>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="postTitle" placeholder="e.g., Amazing sunset in Santorini">
            </div>
            <div class="form-group">
                <label>Content / Story</label>
                <textarea rows="3" id="postContent" placeholder="Tell us about your trip..."></textarea>
            </div>
            <button id="addPostBtn">Publish Post</button>
            <div id="formError" class="error-msg"></div>
        </div>

        <div class="card">
            <h2> My Posts</h2>
            <div id="myPostsList">
                <!-- loaded by JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
