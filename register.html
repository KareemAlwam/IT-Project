<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TravelHub</title>
    <link rel="stylesheet" href="MainLayout/style.css">
    <link rel="stylesheet" href="MainLayout/login-register.css">
    <link id="layoutTheme" rel="stylesheet" href="" data-newhref="NewLayout/auth.css">
    <script>
        (function(){
            if (localStorage.getItem('layout') === 'new') {
                document.documentElement.classList.add('layout-new');
                var l = document.getElementById('layoutTheme');
                if (l) l.setAttribute('href', l.getAttribute('data-newhref'));
            }
        })();
    </script>
</head>
<body>
<nav class="navbar">
        <a href="index.html" class="logo"> TravelHub</a>
        <div class="nav-links">
            <a href="profile.html">Profile</a>
            <button id="layoutToggleBtn" class="layout-toggle-btn" type="button" onclick="toggleLayout()">Dark</button>
            <a href="login.html" class="login-link">Login</a>
            <button id="logoutBtn" class="logout-btn" onclick="logout()" style="display: none;">Logout</button>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Register</h2>
<form id="registerForm" novalidate>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUsername">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="regConfirmPassword">
                </div>
                <div id="regError" class="error-msg"></div>
                <button type="submit">Register</button>
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
