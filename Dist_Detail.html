<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelHub - Destination Details</title>
    <link rel="stylesheet" href="MainLayout/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="MainLayout/Dist_Detail.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">TravelHub</a>
        <div class="nav-links">
            <a href="profile.html">Profile</a>
            <a href="login.html" id="loginNavLink" class="login-link">Login</a>
            <button id="logoutBtn" class="logout-btn" onclick="logout()" style="display: none;">Logout</button>
        </div>
    </nav>

    <!-- Detail Page Container -->
    <div class="detail-page-container">
        <a href="Dist_Search.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Search
        </a>

        <div class="dest-detail-card">
            <!-- Header -->
            <div class="dest-detail-header">
                <div>
                    <div class="dest-name" id="detailDestName"></div>
                    <div class="dest-location" id="detailDestLocation"></div>
                </div>
                <div class="dest-price-display">
                    <div class="price" id="detailDestPrice">$0</div>
                    <div class="per-person">/person</div>
                </div>
            </div>

            <!-- Images -->
            <div class="dest-images-section">
                <div class="main-image-container">
                    <img id="detailMainImage" src="" alt="">
                </div>
                <div class="thumbnail-container" id="detailThumbnailContainer">
                    <!-- Thumbnails will be added here -->
                </div>
            </div>

            <!-- Info Section -->
            <div class="dest-info-section">
                <h3 class="info-section-title"><i class="fas fa-info-circle"></i> Destination Details</h3>
                <div class="info-grid">
                    <div class="info-box">
                        <h4>Rating</h4>
                        <p id="detailDestRating"></p>
                    </div>
                    <div class="info-box">
                        <h4>Category</h4>
                        <p id="detailDestCategory"></p>
                    </div>
                    <div class="info-box">
                        <h4>Country</h4>
                        <p id="detailDestCountry"></p>
                    </div>
                    <div class="info-box">
                        <h4>Weather</h4>
                        <p id="detailDestWeather"></p>
                    </div>
                </div>

                <!-- Description -->
                <div class="description-section">
                    <h4>About this Destination</h4>
                    <p id="detailDestDescription"></p>
                </div>

                <!-- Events -->
                <div class="events-widget">
                    <h3 class="info-section-title"><i class="fas fa-calendar-alt"></i> Events & Tours</h3>
                    <div class="events-list" id="detailEventsList"></div>
                </div>

                <!-- Booking Card -->
                <div class="booking-card">
                    <h3><i class="fas fa-ticket-alt"></i> Book Your Trip</h3>

                    <div class="booking-form-row">
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="bookDate">
                        </div>
                        <div class="form-group">
                            <label>Time</label>
                            <input type="time" id="bookTime">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="bookGuide"> 
                            <span>Book a Tour Guide (+$50)</span>
                        </label>
                    </div>

                    <div class="booking-total">
                        <span class="total-label">Total Price:</span>
                        <span class="total-amount" id="totalPrice">$0</span>
                    </div>
                    <button class="detail-book-btn" onclick="bookDestination()">Book Now</button>
                </div>

                <!-- Comments -->
                <div class="comments-section">
                    <h3 class="info-section-title"><i class="fas fa-comments"></i> Reviews</h3>
                    <div class="comments-list" id="detailComments"></div>
                    <div class="comment-input">
                        <input type="text" id="commentText" placeholder="Write a review...">
                        <button onclick="addDestinationComment()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<footer>
        <p>TravelHub © 2026 | Share your journey</p>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateNavbar();
            loadDestinationDetail();
        });
    </script>
</body>
</html>
